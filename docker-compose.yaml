x-app-resources: &app-resources
  mem_limit: 256m
  cpus: 0.5

x-monitoring-resources: &monitoring-resources
  mem_limit: 256m
  cpus: 0.5

x-ollama-model: &ollama-model qwen2.5:0.5b

x-rabbitmq-env: &rabbitmq-env
  RABBITMQ_URL: amqp://rabbitmq:5672
  RABBITMQ_EXCHANGE: drift.events

x-shared-src-volume: &shared-src-volume ./app/backend/@shared/src:/repo/app/backend/@shared/src

x-backend-build: &backend-build
  context: .
  dockerfile: app/backend/Dockerfile

x-hc-fast: &hc-fast
  interval: 5s
  timeout: 3s
  retries: 5
  start_period: 10s

x-hc-slow: &hc-slow
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 30s

x-base-depends: &base-depends
  postgres:
    condition: service_healthy
  rabbitmq:
    condition: service_healthy

services:
  traefik:
    image: traefik:v3.7.1
    container_name: drift-traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --ping=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:3000
    ports:
      - "3000:3000"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ping"]
      <<: *hc-fast

  loki:
    image: grafana/loki:3.7.2
    container_name: drift-loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"
    volumes:
      - loki_data:/loki
    <<: *monitoring-resources
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.6.11
    container_name: drift-promtail
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail/config.yaml:/etc/promtail/config.yaml:ro
    mem_limit: 128m
    cpus: 0.25
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:13.0.1
    container_name: drift-grafana
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_started
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      <<: *hc-slow

  postgres:
    image: postgres:18-alpine
    container_name: drift-postgres
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./app/backend/post-service/init.sql:/docker-entrypoint-initdb.d/01-post.sql:ro
      - ./app/backend/tag-service/init.sql:/docker-entrypoint-initdb.d/02-tag.sql:ro
      - ./app/backend/analytics-service/init.sql:/docker-entrypoint-initdb.d/03-analytics.sql:ro
    mem_limit: 512m
    cpus: 1.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift"]
      <<: *hc-fast

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: drift-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      <<: *hc-fast

  meilisearch:
    image: getmeili/meilisearch:v1.44.0
    container_name: drift-meilisearch
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped
    healthcheck:
      test: set -o pipefail;curl -fsS http://localhost:7700/health | grep -q '{"status":"available"}'
      <<: *hc-fast

  ollama:
    build:
      context: .
      dockerfile: config/ollama/Dockerfile
    container_name: drift-ollama
    environment:
      OLLAMA_MODEL: *ollama-model
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull $$OLLAMA_MODEL;
      wait"
    mem_limit: 2g
    cpus: 2.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -qF $$OLLAMA_MODEL"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  post-service:
    build:
      <<: *backend-build
      args:
        SERVICE_NAME: post-service
    container_name: drift-post-service
    labels:
      - traefik.enable=true
      - traefik.http.routers.post-service.rule=PathPrefix(`/posts`)
      - traefik.http.services.post-service.loadbalancer.server.port=3000
    expose:
      - "3000"
    environment:
      DB_URL: postgresql://drift:drift@postgres:5432/post_db
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/post-service/src:/repo/app/backend/post-service/src
      - *shared-src-volume
    <<: *app-resources
    restart: unless-stopped
    depends_on: *base-depends

  search-service:
    build:
      <<: *backend-build
      args:
        SERVICE_NAME: search-service
    container_name: drift-search-service
    labels:
      - traefik.enable=true
      - traefik.http.routers.search-service.rule=PathPrefix(`/search`)
      - traefik.http.services.search-service.loadbalancer.server.port=3000
    expose:
      - "3000"
    environment:
      MEILISEARCH_URL: http://meilisearch:7700
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/search-service/src:/repo/app/backend/search-service/src
      - *shared-src-volume
    <<: *app-resources
    restart: unless-stopped
    depends_on:
      <<: *base-depends
      meilisearch:
        condition: service_healthy

  analytics-service:
    build:
      <<: *backend-build
      args:
        SERVICE_NAME: analytics-service
    container_name: drift-analytics-service
    environment:
      DB_URL: postgresql://drift:drift@postgres:5432/analytics_db
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/analytics-service/src:/repo/app/backend/analytics-service/src
      - *shared-src-volume
    <<: *app-resources
    restart: unless-stopped
    depends_on: *base-depends

  tag-service:
    build:
      <<: *backend-build
      args:
        SERVICE_NAME: tag-service
    container_name: drift-tag-service
    environment:
      DB_URL: postgresql://drift:drift@postgres:5432/tag_db
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: *ollama-model
      OLLAMA_TIMEOUT_MS: 60000
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/tag-service/src:/repo/app/backend/tag-service/src
      - *shared-src-volume
    <<: *app-resources
    restart: unless-stopped
    depends_on:
      <<: *base-depends
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  ollama_data:
  meilisearch_data:
  loki_data:
  grafana_data:
