x-app-resources: &app-resources
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: 256M

x-rabbitmq-env: &rabbitmq-env
  RABBITMQ_URL: amqp://rabbitmq:5672
  RABBITMQ_EXCHANGE: drift.events

x-shared-src-volume: &shared-src-volume ./app/backend/@shared/src:/repo/app/backend/@shared/src

x-healthcheck-defaults: &healthcheck-defaults
  interval: 5s
  timeout: 5s
  retries: 5

services:
  postgres:
    image: postgres:18-alpine
    container_name: drift-postgres
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./app/backend/post-service/init.sql:/docker-entrypoint-initdb.d/01-post.sql
      - ./app/backend/tag-service/init.sql:/docker-entrypoint-initdb.d/02-tag.sql
      - ./app/backend/analytics-service/init.sql:/docker-entrypoint-initdb.d/03-analytic.sql
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift"]
      <<: *healthcheck-defaults

  rabbitmq:
    image: rabbitmq:4.3.0-management-alpine
    container_name: drift-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      <<: *healthcheck-defaults

  meilisearch:
    image: getmeili/meilisearch:v1.43.0
    container_name: drift-meilisearch
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: set -o pipefail;curl -fsS http://localhost:7700/health | grep -q '{"status":"available"}'
      retries: 3
      timeout: 5s

  ollama:
    image: ollama/ollama:latest
    container_name: drift-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve & pid=$$!;
      until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull qwen2.5:1.5b;
      wait $$pid"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3G
        reservations:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "ollama list | grep -q 'qwen2.5:1.5b'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  post-service:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
      args:
        SERVICE_NAME: post-service
        PORT: 3001
    container_name: drift-post-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_URL: postgresql://drift:drift@postgres:5432/post_db
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/post-service/src:/repo/app/backend/post-service/src
      - *shared-src-volume
    <<: *app-resources
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  search-service:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
      args:
        SERVICE_NAME: search-service
        PORT: 3002
    container_name: drift-search-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MEILISEARCH_URL: http://meilisearch:7700
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/search-service/src:/repo/app/backend/search-service/src
      - *shared-src-volume
    <<: *app-resources
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      meilisearch:
        condition: service_healthy

  analytics-service:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
      args:
        SERVICE_NAME: analytics-service
    container_name: drift-analytics-service
    environment:
      DB_URL: postgresql://drift:drift@postgres:5432/analytics_db
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/analytics-service/src:/repo/app/backend/analytics-service/src
      - *shared-src-volume
    <<: *app-resources
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  tag-service:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
      args:
        SERVICE_NAME: tag-service
    container_name: drift-tag-service
    environment:
      DB_URL: postgresql://drift:drift@postgres:5432/tag_db
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: qwen2.5:1.5b
      OLLAMA_TIMEOUT_MS: 60000
      <<: *rabbitmq-env
    volumes:
      - ./app/backend/tag-service/src:/repo/app/backend/tag-service/src
      - *shared-src-volume
    <<: *app-resources
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_healthy

volumes:
  postgres_data:
  rabbitmq_data:
  ollama_data:
  meilisearch_data:
